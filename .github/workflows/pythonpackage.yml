name: Python Package

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          python-version: "3.8"

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Run tests
        run: uv run --extra dev pytest .
