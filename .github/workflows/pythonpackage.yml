name: Python Package

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Run tests
        run: uv run --extra dev pytest .

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
